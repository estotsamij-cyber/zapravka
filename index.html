<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛽ ЗАПРАВКА</title>
    <style>
        /* Я сохранила твой стиль, добавила только sticky для шапки статистики */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: white; border-radius: 20px; padding: 20px;
            margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        /* Закрепляем статистику сверху при скролле */
        .stats-card { position: sticky; top: 10px; z-index: 100; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .stat-box { background: #f8f9fa; padding: 15px; border-radius: 15px; border-left: 5px solid #667eea; }
        .stat-label { font-size: 12px; color: #666; margin-bottom: 5px; }
        .stat-value { font-size: 18px; font-weight: bold; color: #333; }
        .corp-value { color: #2563eb; }
        
        .filter-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        select {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd;
            font-size: 16px; margin-bottom: 10px; background: #fdfdfd;
        }
        
        .history-item {
            background: #f8f9fa; border-radius: 15px; padding: 15px;
            margin-bottom: 15px; position: relative; border: 1px solid #eee;
        }
        .history-date { font-size: 12px; color: #888; margin-bottom: 8px; }
        .history-details { font-size: 15px; line-height: 1.4; color: #444; }
        .corp-amount { color: #2563eb; font-weight: bold; margin-top: 8px; display: block; }
        
        .btn-add {
            background: #4CAF50; color: white; border: none; padding: 15px;
            border-radius: 15px; width: 100%; font-size: 18px; font-weight: bold;
            margin-bottom: 20px; cursor: pointer;
        }
        .btn-delete {
            position: absolute; top: 10px; right: 10px; background: #ff4d4d;
            color: white; border: none; border-radius: 8px; padding: 5px 10px; cursor: pointer;
        }
        canvas { width: 100% !important; height: 200px !important; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-add" onclick="addNewEntry()">➕ Добавить заправку</button>

    <div class="card stats-card">
        <h2>📊 Статистика</h2>
        <div class="filter-section">
            <div class="grid">
                <select id="yearSelect" onchange="updateAll()">
                    <option value="all">Все года</option>
                </select>
                <select id="monthSelect" onchange="updateAll()">
                    <option value="all">Все месяцы</option>
                    <option value="1">Январь</option><option value="2">Февраль</option>
                    <option value="3">Март</option><option value="4">Апрель</option>
                    <option value="5">Май</option><option value="6">Июнь</option>
                    <option value="7">Июль</option><option value="8">Август</option>
                    <option value="9">Сентябрь</option><option value="10">Октябрь</option>
                    <option value="11">Ноябрь</option><option value="12">Декабрь</option>
                </select>
            </div>
        </div>
        
        <div class="grid">
            <div class="stat-box">
                <div class="stat-label">Средний расход</div>
                <div id="avgConsumption" class="stat-value">0.00 л/100км</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">К корпчёту</div>
                <div id="totalCorp" class="stat-value corp-value">0.00 €</div>
            </div>
        </div>
        <canvas id="fuelChart"></canvas>
    </div>

    <div class="card">
        <h2>📋 История заправок</h2>
        <div id="historyList" style="margin-top: 15px;">
            </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let db;
    let fuelChart;
    const request = indexedDB.open("ZapravkaDB", 1);

    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("logs", { keyPath: "id", autoIncrement: true });
    };

    request.onsuccess = e => {
        db = e.target.result;
        initYearFilter();
        updateAll();
    };

    function addNewEntry() {
        const price = prompt("Цена за литр (€):", "1.729");
        const liters = prompt("Сколько литров:", "50");
        const odometer = prompt("Пробег сейчас (км):");
        
        if (!price || !liters || !odometer) return;

        const now = new Date();
        const entry = {
            id: Date.now(),
            date: now.toLocaleString('ru-RU'),
            year: now.getFullYear(),
            month: now.getMonth() + 1,
            price: parseFloat(price),
            liters: parseFloat(liters),
            odometer: parseInt(odometer)
        };

        const tx = db.transaction("logs", "readwrite");
        tx.objectStore("logs").add(entry);
        tx.oncomplete = () => {
            initYearFilter();
            updateAll();
        };
    }

    async function updateAll() {
        const tx = db.transaction("logs", "readonly");
        const store = tx.objectStore("logs");
        const allData = await new Promise(res => {
            store.getAll().onsuccess = e => res(e.target.result);
        });

        // 1. Сортируем: Новые сверху
        const sortedData = allData.sort((a, b) => b.id - a.id);

        // 2. Фильтруем по году и месяцу
        const selYear = document.getElementById('yearSelect').value;
        const selMonth = document.getElementById('monthSelect').value;

        const filteredData = sortedData.filter(item => {
            const matchYear = (selYear === 'all' || item.year == selYear);
            const matchMonth = (selMonth === 'all' || item.month == selMonth);
            return matchYear && matchMonth;
        });

        renderStats(filteredData);
        renderHistory(filteredData);
        updateChart(filteredData);
    }

    function renderStats(data) {
        let totalLiters = 0;
        let totalCorp = 0;
        let firstOdo = 0;
        let lastOdo = 0;

        if (data.length > 0) {
            // Для расхода берем разницу пробега в отфильтрованном периоде
            const sortedByOdo = [...data].sort((a,b) => a.odometer - b.odometer);
            firstOdo = sortedByOdo[0].odometer;
            lastOdo = sortedByOdo[sortedByOdo.length-1].odometer;
            
            data.forEach(item => {
                totalLiters += item.liters;
                // Считаем корпчёт (80.65% от суммы - как у тебя в коде было)
                totalCorp += (item.price * item.liters) * 0.8065;
            });
        }

        const distance = lastOdo - firstOdo;
        const avg = distance > 0 ? (totalLiters / distance * 100) : 0;

        document.getElementById('avgConsumption').textContent = `${avg.toFixed(2)} л/100км`;
        document.getElementById('totalCorp').textContent = `${totalCorp.toFixed(2)} €`;
    }

    function renderHistory(data) {
        const list = document.getElementById('historyList');
        list.innerHTML = data.length ? '' : '<p style="color: #888; text-align: center;">Нет данных за этот период</p>';
        
        data.forEach(item => {
            const corpAmount = (item.price * item.liters) * 0.8065;
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <div class="history-date">${item.date}</div>
                <div class="history-details">
                    ${item.price.toFixed(3)} €/L × ${item.liters}L<br>
                    Пробег: ${item.odometer} км
                </div>
                <span class="corp-amount">К корпчёту: ${corpAmount.toFixed(2)} €</span>
                <button class="btn-delete" onclick="deleteEntry(${item.id})">❌</button>
            `;
            list.appendChild(div);
        });
    }

    function updateChart(data) {
        const ctx = document.getElementById('fuelChart').getContext('2d');
        const chartData = [...data].sort((a,b) => a.id - b.id); // Для графика хронология

        if (fuelChart) fuelChart.destroy();

        fuelChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartData.map(i => i.date.split(',')[0]),
                datasets: [{
                    label: 'Цена €/L',
                    data: chartData.map(i => i.price),
                    borderColor: '#667eea',
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(102, 126, 234, 0.1)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });
    }

    function initYearFilter() {
        const tx = db.transaction("logs", "readonly");
        tx.objectStore("logs").getAll().onsuccess = e => {
            const years = [...new Set(e.target.result.map(i => i.year))].sort((a,b) => b - a);
            const select = document.getElementById('yearSelect');
            const currentVal = select.value;
            select.innerHTML = '<option value="all">Все года</option>';
            years.forEach(y => {
                const opt = document.createElement('option');
                opt.value = y; opt.textContent = y;
                select.appendChild(opt);
            });
            select.value = currentVal;
        };
    }

    function deleteEntry(id) {
        if (!confirm("Удалить запись?")) return;
        const tx = db.transaction("logs", "readwrite");
        tx.objectStore("logs").delete(id);
        tx.oncomplete = () => updateAll();
    }
</script>
</body>
</html>
