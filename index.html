<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛽ ЗАПРАВКА 2.0</title>
    <style>
        /* Чистим старый мусор и делаем красиво */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff; min-height: 100vh; padding: 15px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Кнопка добавления */
        .btn-add {
            background: #4CAF50; color: white; border: none; padding: 18px;
            border-radius: 15px; width: 100%; font-size: 18px; font-weight: bold;
            margin-bottom: 20px; box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            cursor: pointer;
        }

        /* Карточки */
        .card {
            background: rgba(255, 255, 255, 0.95); color: #333;
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        /* Липкая статистика */
        .stats-card { position: sticky; top: 10px; z-index: 100; border: 2px solid #4a90e2; }
        
        h2 { font-size: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        select {
            padding: 12px; border-radius: 12px; border: 1px solid #ddd;
            font-size: 16px; background: #f8f9fa; width: 100%;
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-box { background: #f0f4f8; padding: 15px; border-radius: 15px; text-align: center; }
        .stat-label { font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 18px; font-weight: 800; color: #1a1a2e; }
        .corp-color { color: #007bff; }

        /* История */
        .history-item {
            background: #f8f9fa; border-radius: 15px; padding: 15px;
            margin-bottom: 12px; position: relative; border-left: 5px solid #007bff;
        }
        .item-date { font-size: 12px; color: #888; margin-bottom: 5px; }
        .item-info { font-size: 15px; line-height: 1.4; }
        .item-corp { display: block; margin-top: 8px; font-weight: bold; color: #007bff; font-size: 16px; }
        
        .btn-del {
            position: absolute; top: 15px; right: 15px; background: #ff4d4d;
            color: white; border: none; width: 30px; height: 30px; border-radius: 8px; cursor: pointer;
        }

        canvas { width: 100% !important; height: 150px !important; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-add" onclick="addNewEntry()">➕ Добавить заправку</button>

    <div class="card stats-card">
        <h2>📊 Статистика</h2>
        <div class="filter-grid">
            <select id="yearSelect" onchange="updateUI()"><option value="all">Все года</option></select>
            <select id="monthSelect" onchange="updateUI()">
                <option value="all">Все месяцы</option>
                <option value="1">Январь</option><option value="2">Февраль</option>
                <option value="3">Март</option><option value="4">Апрель</option>
                <option value="5">Май</option><option value="6">Июнь</option>
                <option value="7">Июль</option><option value="8">Август</option>
                <option value="9">Сентябрь</option><option value="10">Октябрь</option>
                <option value="11">Ноябрь</option><option value="12">Декабрь</option>
            </select>
        </div>
        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-label">Расход ср.</div>
                <div id="res-avg" class="stat-value">0.00</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">К корпчёту</div>
                <div id="res-corp" class="stat-value corp-color">0.00 €</div>
            </div>
        </div>
        <canvas id="mainChart"></canvas>
    </div>

    <div class="card">
        <h2>📋 История</h2>
        <div id="history-list"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let db;
    let myChart;
    const req = indexedDB.open("ZapravkaProDB", 1);

    req.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("logs", { keyPath: "id" });
    };

    req.onsuccess = e => {
        db = e.target.result;
        refreshYearFilter();
        updateUI();
    };

    function addNewEntry() {
        const p = prompt("Цена за литр (€):", "1.729");
        const l = prompt("Литры:", "50");
        const o = prompt("Пробег (км):");
        if(!p || !l || !o) return;

        const d = new Date();
        const entry = {
            id: Date.now(),
            date: d.toLocaleString('ru-RU'),
            year: d.getFullYear(),
            month: d.getMonth() + 1,
            price: parseFloat(p),
            liters: parseFloat(l),
            odo: parseInt(o)
        };

        const tx = db.transaction("logs", "readwrite");
        tx.objectStore("logs").add(entry);
        tx.oncomplete = () => { refreshYearFilter(); updateUI(); };
    }

    async function updateUI() {
        const tx = db.transaction("logs", "readonly");
        const data = await new Promise(res => {
            tx.objectStore("logs").getAll().onsuccess = e => res(e.target.result);
        });

        // Сортировка: новые сверху
        const sorted = data.sort((a,b) => b.id - a.id);
        
        const selY = document.getElementById('yearSelect').value;
        const selM = document.getElementById('monthSelect').value;

        // Фильтрация
        const filtered = sorted.filter(i => {
            return (selY === 'all' || i.year == selY) && (selM === 'all' || i.month == selM);
        });

        drawStats(filtered);
        drawHistory(filtered);
        drawChart(filtered);
    }

    function drawStats(data) {
        let totalL = 0, totalC = 0;
        if(data.length > 1) {
            const sortedOdo = [...data].sort((a,b) => a.odo - b.odo);
            const dist = sortedOdo[sortedOdo.length-1].odo - sortedOdo[0].odo;
            data.forEach(i => {
                totalL += i.liters;
                totalC += (i.price * i.liters) * 0.8065;
            });
            const avg = dist > 0 ? (totalL / dist * 100) : 0;
            document.getElementById('res-avg').innerText = avg.toFixed(2) + " л/100";
        } else {
            document.getElementById('res-avg').innerText = "0.00";
            if(data.length === 1) totalC = (data[0].price * data[0].liters) * 0.8065;
        }
        document.getElementById('res-corp').innerText = totalC.toFixed(2) + " €";
    }

    function drawHistory(data) {
        const container = document.getElementById('history-list');
        container.innerHTML = data.length ? '' : '<p style="text-align:center;color:#999">Нет записей</p>';
        data.forEach(i => {
            const corp = (i.price * i.liters) * 0.8065;
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <div class="item-date">${i.date}</div>
                <div class="item-info"><b>${i.price.toFixed(3)} €/L</b> · ${i.liters}L · ${i.odo} км</div>
                <span class="item-corp">К корпчёту: ${corp.toFixed(2)} €</span>
                <button class="btn-del" onclick="deleteEntry(${i.id})">✕</button>
            `;
            container.appendChild(div);
        });
    }

    function drawChart(data) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const cData = [...data].sort((a,b) => a.id - b.id);
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: cData.map(i => i.date.split(',')[0]),
                datasets: [{
                    label: 'Цена',
                    data: cData.map(i => i.price),
                    borderColor: '#007bff',
                    backgroundColor: 'rgba(0,123,255,0.1)',
                    fill: true, tension: 0.4
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false } } }
        });
    }

    function refreshYearFilter() {
        const tx = db.transaction("logs", "readonly");
        tx.objectStore("logs").getAll().onsuccess = e => {
            const years = [...new Set(e.target.result.map(i => i.year))].sort((a,b) => b-a);
            const s = document.getElementById('yearSelect');
            const cur = s.value;
            s.innerHTML = '<option value="all">Все года</option>';
            years.forEach(y => s.innerHTML += `<option value="${y}">${y}</option>`);
            s.value = cur;
        };
    }

    function deleteEntry(id) {
        if(confirm("Удалить?")) {
            const tx = db.transaction("logs", "readwrite");
            tx.objectStore("logs").delete(id);
            tx.oncomplete = () => updateUI();
        }
    }
</script>
</body>
</html>
